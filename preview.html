<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epitacio Brito — Retrato em Partículas</title>
  <style>
    :root {
      --bg0: #02050a;
      --bg1: #07101a;
      --text: rgba(238, 245, 255, .82);
      --muted: rgba(238, 245, 255, .46);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 44%, rgba(50, 62, 76, .26), transparent 34%),
        radial-gradient(circle at 28% 55%, rgba(21, 57, 74, .20), transparent 38%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 58%, #03040a);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: clamp(18px, 2.8vw, 42px);
      bottom: clamp(18px, 3vw, 44px);
      max-width: 420px;
      pointer-events: none;
      user-select: none;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .78;
      mix-blend-mode: screen;
    }

    .hud .kicker {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .hud .name {
      font-size: clamp(20px, 2vw, 34px);
      font-weight: 700;
      line-height: 1.02;
    }

    .hud .hint {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: .12em;
      color: rgba(238, 245, 255, .38);
      text-transform: none;
    }

    @media (max-width: 720px) {
      .hud {
        left: 16px;
        right: 16px;
        bottom: 16px;
      }
      .hud .name {
        font-size: 18px;
      }
      .hud .hint {
        display: none;
      }
    }
  </style>
</head>

        const curl = approach * (18 + amp[i] * 0.34);
        const x = lerp(wx, targetX[i], p) + Math.cos(phase[i] + t * 1.15) * curl * (1 - p * 0.55);
        const y = lerp(wy, targetY[i], p) + Math.sin(phase[i] * 1.37 - t * 0.92) * curl * (1 - p * 0.55);

        const settle = smoothstep(0.86, 1, p);
        const jitter = settle * 0.34;
        const fx = x + Math.sin(t * 2.6 + phase[i]) * jitter;
        const fy = y + Math.cos(t * 2.1 + phase[i] * 1.2) * jitter;

        const alpha = initialFade * baseAlpha[i] * (0.30 + p * 0.74);
        if (alpha < 0.015) continue;

        const s = size[i] * (0.62 + p * 0.52);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = colors[i];
        ctx.fillRect(fx, fy, s, s);
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawFocusSparkles(t) {
      if (t < 2.2) return;

      const p = smoothstep(2.2, 7.1, t);
      const rnd = mulberry32(0xBADC0DE);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      const n = W < 640 ? 30 : 58;
      for (let i = 0; i < n; i++) {
        const a = rnd() * TAU;
        const rr = targetBox.w * (0.19 + rnd() * 0.26) * (1.22 - p * 0.34);
        const cx = targetBox.x + targetBox.w * (0.50 + Math.cos(a) * 0.14);
        const cy = targetBox.y + targetBox.h * (0.35 + Math.sin(a) * 0.12);
        const x = lerp(cx + Math.cos(a + t * 0.45) * rr, cx, p);
        const y = lerp(cy + Math.sin(a * 1.7 - t * 0.52) * rr, cy, p);
        const blink = 0.5 + 0.5 * Math.sin(t * (1.2 + rnd() * 1.4) + i);

        ctx.globalAlpha = 0.06 * p * blink;
        ctx.fillStyle = "rgb(255,235,190)";
        ctx.fillRect(x, y, 1.2 + rnd() * 1.4, 1.2 + rnd() * 1.4);
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function animate(now) {
      const t = (now - startTime) / 1000;

      if (!frameReady) {
        rafId = requestAnimationFrame(animate);
        return;
      }

      drawBackdrop(t);
      drawWindField(t);
      drawParticles(t);
      drawFocusSparkles(t);

      rafId = requestAnimationFrame(animate);
    }

    function rebuild() {
      cancelAnimationFrame(rafId);
      setCanvasSize();
      buildTargets();
      resetAnimation();
      rafId = requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(rebuild, 140);
    });

    window.addEventListener("pointerdown", resetAnimation, { passive: true });

    window.addEventListener("keydown", (ev) => {
      if (ev.key && ev.key.toLowerCase() === "r") resetAnimation();
    });

    source.onload = () => {
      setCanvasSize();
      buildTargets();
      paintInitialBackground();
      rafId = requestAnimationFrame(animate);
    };

    source.src = SOURCE_IMAGE;
  })();
  </script>
</body>
